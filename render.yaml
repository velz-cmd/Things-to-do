# Render Blueprint — RESOLVE / Deputy
# Apply: https://dashboard.render.com/blueprint/new?repo=https://github.com/velz-cmd/Things-to-do
# After first deploy, set APP_URL + NEXT_PUBLIC_APP_URL to your onrender.com hostname.

envVarGroups:
  - name: resolve-public
    envVars:
      - key: NODE_ENV
        value: production
      - key: PLAYWRIGHT_ENABLED
        value: "true"
      - key: DEPUTY_DEMO_MODE
        value: "false"
      - key: NEXT_PUBLIC_DEPUTY_DEMO_MODE
        value: "false"
      - key: AI_SWARM_ENABLED
        value: "true"
      - key: CLOUDFLARE_AI_GATEWAY_ENABLED
        value: "false"
      - key: NEXT_PUBLIC_ARC_CHAIN_ID
        value: "5042002"
      - key: ARC_CHAIN_ID
        value: "5042002"
      - key: ARC_RPC_URL
        value: https://rpc.testnet.arc.network
      - key: ARC_TESTNET_RPC_URL
        value: https://rpc.testnet.arc.network
      - key: NEXT_PUBLIC_USDC_ADDRESS
        value: "0x3600000000000000000000000000000000000000"
      - key: ARC_USDC_CONTRACT
        value: "0x3600000000000000000000000000000000000000"
      - key: ARC_AGENTIC_COMMERCE_CONTRACT
        value: "0x0747EEf0706327138c69792bF28Cd525089e4583"
      - key: ARC_EXPLORER_URL
        value: https://testnet.arcscan.app
      - key: NEXT_PUBLIC_ARC_EXPLORER_URL
        value: https://testnet.arcscan.app
      - key: NEXT_PUBLIC_DEPUTY_ESCROW_ADDRESS
        value: "0x4e9b728a3c46315d8ec4df19b972f78b1a4f669f"
      - key: NEXT_PUBLIC_RESOLVE_AGENT_ADDRESS
        value: "0xDD81E79E22053a4d7036D6E9DB22Dad591b65511"
      - key: BLOCKSCOUT_CHAIN_ID
        value: "5042002"
      - key: ERC8004_IDENTITY_REGISTRY
        value: "0x8004A818BFB912233c491871b3d84c89A494BD9e"
      - key: ERC8004_REPUTATION_REGISTRY
        value: "0x8004B663056A597Dffe9eCcC1965A193B7388713"
      - key: ERC8004_VALIDATION_REGISTRY
        value: "0x8004Cb1BF31DAf7788923b405b754f57acEB4272"
      - key: RESEND_FROM_EMAIL
        value: onboarding@resend.dev

services:
  - type: web
    name: deputy
    runtime: node
    plan: free
    region: oregon
    branch: main
    repo: https://github.com/velz-cmd/Things-to-do
    buildCommand: npm install && npx prisma db push && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health/live
    envVars:
      - fromGroup: resolve-public
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
