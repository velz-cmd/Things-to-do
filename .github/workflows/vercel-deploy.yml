name: Verify Vercel Production

# Vercel Git integration deploys production on push to main (one deploy per merge).
# Do NOT add VERCEL_TOKEN to GitHub secrets — CLI deploys duplicated Git deploys
# and burned the free-tier 100 deploys/day limit (api-deployments-free-per-day).
# Preview deploys are skipped via vercel.json ignoreCommand.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      trigger_deploy_hook:
        description: "Manually trigger deploy hook (only if Git deploy is stuck AND quota reset)"
        required: false
        default: false
        type: boolean

concurrency:
  group: vercel-production
  cancel-in-progress: true

env:
  PRODUCTION_URL: https://resolve-task.vercel.app
  VERCEL_DEPLOY_HOOK_URL: https://api.vercel.com/v1/integrations/deploy/prj_bCorqG2sezHdXiRmedRRwV0Q7Rhd/krAQUtlB2i

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Optional manual deploy hook
        if: github.event_name == 'workflow_dispatch' && inputs.trigger_deploy_hook == true
        run: |
          echo "Triggering deploy hook (manual)..."
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL" || {
            echo "::warning::Deploy hook failed (often rate limit). Wait 24h or merge to main for Git deploy."
            exit 0
          }
          echo "Deploy hook fired. Waiting before health check..."

      - name: Wait for production deployment
        continue-on-error: true
        id: health
        run: |
          echo "Verifying $PRODUCTION_URL (Vercel Git deploys automatically on push to main)..."
          for i in $(seq 1 40); do
            if curl -fsS "$PRODUCTION_URL/api/health/env" | grep -q '"ok":true'; then
              echo "✓ Production healthy (attempt $i)"
              curl -fsS "$PRODUCTION_URL/api/config" | head -c 400 || true
              echo ""
              exit 0
            fi
            echo "Waiting for deployment... ($i/40)"
            sleep 15
          done
          echo "::warning::Production not healthy yet — may be Vercel rate limit. Site may still be on previous deploy."
          exit 0
