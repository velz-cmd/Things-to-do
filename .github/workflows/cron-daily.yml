name: Sensor cron (tick + notify + claimable)

# Vercel crons removed from vercel.json — CRON_SECRET with whitespace breaks Vercel builds.
# GitHub Actions calls production with a trimmed secret from repo secrets.

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: resolve-daily-cron
  cancel-in-progress: false

jobs:
  cron:
    runs-on: ubuntu-latest
    steps:
      - name: Trim secret
        id: secret
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TRIMMED="$(printf '%s' "$CRON_SECRET" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          echo "configured=true" >> "$GITHUB_OUTPUT"
          echo "::add-mask::$TRIMMED"
          echo "value=$TRIMMED" >> "$GITHUB_OUTPUT"

      - name: Daily tick (sensors + earn notify)
        if: steps.secret.outputs.configured == 'true'
        env:
          PRODUCTION_URL: https://things-to-do-eta.vercel.app
          SECRET: ${{ steps.secret.outputs.value }}
        run: |
          curl -fsS -X POST "$PRODUCTION_URL/api/cron/tick" \
            -H "Authorization: Bearer $SECRET" | head -c 1200
          echo ""

      - name: GitHub OSS scan
        if: steps.secret.outputs.configured == 'true'
        env:
          PRODUCTION_URL: https://things-to-do-eta.vercel.app
          SECRET: ${{ steps.secret.outputs.value }}
        run: |
          curl -fsS -X POST "$PRODUCTION_URL/api/cron/github-oss-scan" \
            -H "Authorization: Bearer $SECRET" | head -c 800
          echo ""

      - name: Full sensor bootstrap if ledger still empty
        if: steps.secret.outputs.configured == 'true'
        env:
          PRODUCTION_URL: https://things-to-do-eta.vercel.app
          SECRET: ${{ steps.secret.outputs.value }}
        run: |
          LIVE=$(curl -fsS "$PRODUCTION_URL/api/health/live" | grep -o '"activityCount":[0-9]*' | cut -d: -f2)
          echo "activityCount=${LIVE:-0}"
          if [ "${LIVE:-0}" = "0" ]; then
            echo "Ledger empty — running bootstrap-sensors"
            curl -fsS -X POST "$PRODUCTION_URL/api/cron/bootstrap-sensors" \
              -H "Authorization: Bearer $SECRET" \
              -H "Content-Type: application/json" \
              -d '{}' | head -c 1200
            echo ""
          fi
          curl -fsS "$PRODUCTION_URL/api/health/live" | head -c 800
          echo ""
