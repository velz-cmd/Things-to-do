  - type: cron
    name: github-oss-scan
    runtime: node
    plan: free
    region: oregon
    branch: main
    repo: https://github.com/velz-cmd/Things-to-do
    schedule: "0 */6 * * *"
    buildCommand: npm install
    startCommand: >-
      curl -fsS -X POST "${RENDER_EXTERNAL_URL}/api/cron/github-oss-scan"
      -H "Authorization: Bearer ${CRON_SECRET}"
    envVars:
      - fromGroup: resolve-public
      - key: CRON_SECRET
        sync: false
      - key: GITHUB_TOKEN
        sync: false
