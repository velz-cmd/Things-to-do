name: Verify Vercel Production

# Vercel Git integration deploys production on push to main (one deploy per merge).
# Do NOT add VERCEL_TOKEN to GitHub secrets — CLI deploys duplicated Git deploys
# and burned the free-tier 100 deploys/day limit (api-deployments-free-per-day).
# Preview/cursor/codex branch deploys are disabled in vercel.json (git.deploymentEnabled).

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      trigger_deploy_hook:
        description: "Deprecated — use push to main. Kept for workflow_dispatch compatibility."
        required: false
        default: false
        type: boolean

concurrency:
  group: vercel-production
  cancel-in-progress: true

env:
  PRODUCTION_URL: https://things-to-do-eta.vercel.app
  # Deploy hook removed from repo — manual Redeploy in Vercel duplicates production
  # queue entries and blocks Hobby-tier builds (1 concurrent). Use push-to-main only.

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Optional manual deploy hook (disabled)
        if: github.event_name == 'workflow_dispatch' && inputs.trigger_deploy_hook == true
        run: |
          echo "::warning::Deploy hook removed — push to main triggers one Vercel production build."
          echo "Cancel queued Redeploy rows in Vercel dashboard; do not click Redeploy repeatedly."

      - name: Wait for production deployment
        continue-on-error: true
        id: health
        run: |
          echo "Verifying $PRODUCTION_URL (Vercel Git deploys automatically on push to main)..."
          EXPECT_SHA="${{ github.sha }}"
          for i in $(seq 1 40); do
            DEPLOY_JSON=$(curl -fsS "$PRODUCTION_URL/api/health/deploy" 2>/dev/null || echo '{}')
            COMMIT=$(echo "$DEPLOY_JSON" | grep -o '"commit":"[^"]*"' | head -1 | cut -d'"' -f4)
            if curl -fsS "$PRODUCTION_URL/api/health/env" | grep -q '"ok":true'; then
              if [ -n "$COMMIT" ] && [ "${EXPECT_SHA:0:7}" = "$COMMIT" ]; then
                echo "✓ Production healthy · deploy commit $COMMIT matches push ${EXPECT_SHA:0:7}"
                curl -fsS "$PRODUCTION_URL/api/config" | head -c 400 || true
                echo ""
                exit 0
              fi
              echo "✓ Health OK but deploy commit=${COMMIT:-unknown} (expect ${EXPECT_SHA:0:7}) — attempt $i"
            fi
            echo "Waiting for deployment... ($i/40)"
            sleep 15
          done
          echo "::warning::Production not on latest commit yet — check Vercel deploy logs (CRON_SECRET whitespace is a common blocker)."
          exit 0
